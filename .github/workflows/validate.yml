name: Validate

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff pytest

      - name: Ruff check
        run: ruff check . --select E,F

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install httpx pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate _manifest.json
        run: |
          python3 -c "
          import json
          with open('_manifest.json') as f:
              d = json.load(f)
          assert d['manifest_version'] == 2
          assert d['id'] == 'qr0w.maiclaude'
          assert d['license'] == 'MIT'
          assert isinstance(d['author'], dict)
          assert 'name' in d['author'] and 'url' in d['author']
          print('Manifest OK')
          "

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python syntax
        run: |
          python3 -c "
          import ast, os
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git','__pycache__','.omc','data')]
              for fn in files:
                  if fn.endswith('.py'):
                      path = os.path.join(root, fn)
                      with open(path) as fh:
                          ast.parse(fh.read())
          print('All Python files syntax OK')
          "
